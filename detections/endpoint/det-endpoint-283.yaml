id: det-endpoint-283
name: macOS Local Account Created via sysadminctl or dscl
description: Detects the creation of a new local user account on macOS via sysadminctl,
  createhomedir, dseditgroup, or dscl. Leverages osquery process_events telemetry.
  Unauthorized account creation can indicate persistence or lateral movement.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1136
- mitre.attack.t1136.001
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: process_events
detection:
  condition: |
    (
      image_basename == "sysadminctl" AND command_line CONTAINS "-addUser"
    ) OR (
      image_basename == "createhomedir" AND command_line CONTAINS "-u"
    ) OR (
      image_basename == "dseditgroup" AND command_line CONTAINS_ANY ["edit", "-a"]
    ) OR (
      image_basename == "dscl" AND command_line CONTAINS "-create"
    )
false_positives:
- IT provisioning scripts creating accounts during onboarding (allowlist provisioning hosts)
playbook: tpl-persistence
enabled: true
author: AiSOC
created: '2026-05-10'
modified: '2026-05-10'
provenance:
  source: splunk/security_content
  source_id: macos-account-created
  license: Apache-2.0
