id: det-endpoint-288
name: macOS LOLBin Lateral Movement via osascript or curl
description: Detects living-off-the-land binary (LOLBin) usage on macOS for lateral
  movement or remote command execution. Attackers commonly abuse osascript, curl,
  ssh, and other built-in utilities to move laterally without triggering traditional
  AV signatures.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1021
- mitre.attack.t1059.002
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: process_events
detection:
  condition: |
    (
      image_basename == "osascript"
      AND command_line CONTAINS_ANY ["-e", "-l JavaScript"]
      AND command_line CONTAINS_ANY ["do shell script", "do script", "curl", "wget", "nc"]
    ) OR (
      image_basename == "curl"
      AND command_line CONTAINS_ANY ["-o", "--output", "|", "sh", "bash"]
      AND parent_image_basename IN ["osascript", "bash", "zsh", "python3"]
    )
false_positives:
- Legitimate scripting automation using osascript (allowlist specific scripts or users)
playbook: tpl-lateral-movement
enabled: true
author: AiSOC
created: '2026-05-10'
modified: '2026-05-10'
provenance:
  source: splunk/security_content
  source_id: macos-lolbin-lateral-movement-via-osascript
