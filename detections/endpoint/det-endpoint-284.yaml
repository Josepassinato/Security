id: det-endpoint-284
name: macOS AMOS Stealer Virtual Machine Check Activity
description: Detects macOS Atomic Stealer (AMOS) malware performing virtual machine
  environment checks. The malware queries system_info and osquery tables to detect
  sandbox or VM environments and bail out if running under analysis. This pattern
  indicates active stealer malware evasion.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1497
- mitre.attack.t1497.001
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: process_events
detection:
  condition: |
    image_basename IN ["osqueryi", "osqueryd"]
    AND command_line CONTAINS_ANY [
      "system_info",
      "hardware_model",
      "cpu_brand",
      "virtual_machine"
    ]
    AND parent_image_basename NOT IN ["launchd", "bash", "zsh", "osquery_watchdog"]
false_positives:
- Security tooling performing legitimate VM checks (allowlist known security software)
playbook: tpl-credential-access
enabled: true
author: AiSOC
created: '2026-05-10'
modified: '2026-05-10'
provenance:
  source: splunk/security_content
  source_id: macos-amos-stealer-virtual-machine-check-activity
  license: Apache-2.0
