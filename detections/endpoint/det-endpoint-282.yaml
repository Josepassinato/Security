id: det-endpoint-282
name: Osquery Service Stop via auditd
description: Detects the osquery daemon being stopped or disabled on a Linux host
  via systemctl or service commands, as captured by the Linux auditd subsystem. Stopping
  osquery can be an indicator of a threat actor disabling endpoint telemetry to evade
  detection.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1489
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: process_events
detection:
  condition: |
    image_basename IN ["systemctl", "service"]
    AND command_line CONTAINS "osquery"
    AND command_line CONTAINS_ANY ["stop", "disable", "kill"]
false_positives:
- Authorized osquery upgrades or maintenance windows (allowlist change-control windows)
playbook: tpl-defense-evasion
enabled: true
author: AiSOC
created: '2026-05-10'
modified: '2026-05-10'
provenance:
  source: splunk/security_content
  source_id: linux-auditd-osquery-service-stop
  license: Apache-2.0
