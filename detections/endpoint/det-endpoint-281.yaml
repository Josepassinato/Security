id: det-endpoint-281
name: Baron Samedit CVE-2021-3156 Exploitation via osquery
description: Detects exploitation attempts of CVE-2021-3156 (Baron Samedit), a heap-based
  buffer overflow in sudo that allows privilege escalation to root. Identified via
  osquery process telemetry watching for sudoedit or sudo invocations with patterns
  matching the exploit.
version: 1.0.0
severity: high
tags:
- mitre.attack.t1068
- tlp.white
category: endpoint
log_source:
  product: osquery
  service: process_events
detection:
  condition: |
    image_basename IN ["sudo", "sudoedit"]
    AND command_line CONTAINS_ANY ["\\", "-s", "-i"]
    AND (command_line CONTAINS "\\" AND command_line CONTAINS "-s")
false_positives:
- Legitimate sudo usage with shell escaping in admin scripts (allowlist trusted hosts)
playbook: tpl-privilege-escalation
enabled: true
author: AiSOC
created: '2026-05-10'
modified: '2026-05-10'
provenance:
  source: splunk/security_content
  source_id: detect-baron-samedit-cve-2021-3156-via-osquery
  license: Apache-2.0
