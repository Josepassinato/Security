id: det-endpoint-211
name: App Store Receipt File Tampered
description: Quarry v1 curated detection. Triggers on the endpoint signal described by 'App Store Receipt
  File Tampered'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: medium
tags:
- mitre.attack.t1562
- tlp.white
category: endpoint
log_source:
  product: macos
  service: endpointsecurity
detection:
  condition: |
    event_type == "ES_EVENT_TYPE_NOTIFY_WRITE"
    AND path ENDSWITH "_MASReceipt/receipt"
false_positives:
- MAS app reinstall
playbook: tpl-defense-evasion
enabled: true
author: Quarry
created: '2026-05-03'
modified: '2026-05-03'
