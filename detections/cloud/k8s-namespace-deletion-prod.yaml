id: det-cloud-179
name: Kubernetes Production Namespace Deleted
description: Quarry v1 curated detection. Triggers on the cloud signal described by 'Kubernetes Production
  Namespace Deleted'. Watch the 1 documented false-positive case before tuning.
version: 1.0.0
severity: critical
tags:
- mitre.attack.t1485
- tlp.white
category: cloud
log_source:
  product: kubernetes
  service: audit
detection:
  condition: |
    verb == "delete"
    AND object_resource == "namespaces"
    AND object_name IN ["prod", "production"]
false_positives:
- Documented break-glass procedure
playbook: tpl-impact
enabled: true
author: Quarry
created: '2026-05-03'
modified: '2026-05-03'
