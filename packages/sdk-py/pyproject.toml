[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "quarry-sdk"
version = "4.0.0"
description = "Python client SDK for Quarry — typed httpx client"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["quarry", "soc", "security", "client", "sdk"]
authors = [{ name = "Quarry Contributors", email = "oss@quarry.io" }]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
    "mypy>=1.9",
    "ruff>=0.4",
]

[project.urls]
Homepage = "https://github.com/Josepassinato/quarry"
Documentation = "https://beenuar.github.io/Quarry"
Repository = "https://github.com/Josepassinato/quarry"
Issues = "https://github.com/Josepassinato/quarry/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/quarry_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100

[tool.mypy]
strict = true
