title: PIX Falso Estorno - MED Request Filed After Victim Outbound
id: 5a8c1d4f-2e7b-4f3a-b8d6-4c9e2a5f8b13
status: experimental
description: |
  Correlates a victim's PIX outbound (presumed refund to scammer's third
  account) with an MED request filed by the original sender within 6 hours
  after the original inbound. High-confidence PIX-002 signature: scammer
  receives the refund AND triggers MED to recover the seed PIX, achieving
  double profit.
  Link to threat pattern: customizations/threat-intel/br-fintech/patterns/PIX-002-golpe-pix-errado.yaml
references:
  - https://www.cnnbrasil.com.br/economia/financas/golpe-do-pix-errado-entenda-como-funciona-e-saiba-como-se-proteger/
  - https://www.bcb.gov.br/content/estabilidadefinanceira/pix/Guia_MED.pdf
  - https://www.em.com.br/emfoco/2025/04/08/banco-central-alerta-sobre-novo-golpe-com-devolucao-via-pix-entenda/
author: Quarry - Increase Trainer Inc.
date: 2026/05/15
modified: 2026/05/15
tags:
  - attack.t1656
  - attack.t1657
  - vertical.fintech_br
  - quarry.pattern.PIX-002
  - quarry.severity.critical
logsource:
  product: fintech_core
  category: transaction
detection:
  selection:
    correlation_type: 'pix_002_falso_estorno'
    victim_outbound_to_third_account: true
    med_request_by_original_sender_within_hours: '<=6'
    amount_match_pct: '>=99'
  filter_legit:
    med_resolved_legitimate: true
  condition: selection and not filter_legit
fields:
  - victim_account_id
  - scammer_origin_chave
  - scammer_refund_chave
  - amount_brl
  - med_filed_at
  - med_request_id
falsepositives:
  - Disputa legitima onde ordenante errou e abriu MED por descuido
  - Vitima genuina de troca de chaves entre originador e destinatario
level: critical
