title: Money Mule - New Account Large First PIX Outbound
id: 7a4f8c1e-2b9d-4e3a-8f15-6c8b2d3e4a91
status: experimental
description: |
  Detects accounts younger than 7 days that send their first PIX outbound
  with amount above R$1.000, immediately after receiving a significant inbound
  PIX. Classic money mule signature in BR fintechs where attackers recruit
  conta-laranja holders and rapidly redirect victim funds before MED tracking.
  Link to threat pattern: customizations/threat-intel/br-fintech/patterns/PIX-001-money-mule.yaml
references:
  - https://www.bcb.gov.br/content/estabilidadefinanceira/pix/Guia_MED.pdf
  - https://www.bcb.gov.br/content/estabilidadefinanceira/pix/MED/MED_2-0_Circuito_Pix-Dia_1.pdf
  - https://finsidersbrasil.com.br/eventos/golpes-com-pix-dao-prejuizos-de-quase-r-3-bi-em-dois-anos-diz-febraban/
author: Quarry - Increase Trainer Inc.
date: 2026/05/15
modified: 2026/05/15
tags:
  - attack.t1078.003
  - attack.t1657
  - vertical.fintech_br
  - quarry.pattern.PIX-001
  - quarry.severity.high
logsource:
  product: pix_gateway
  category: transaction
detection:
  selection_outbound:
    event_type: 'pix.send'
    amount_brl: '>=1000'
    account_age_days: '<7'
    is_first_outbound: true
  filter_legit:
    kyc_level: 'enhanced'
    historical_inbound_pix_count: '>5'
  condition: selection_outbound and not filter_legit
fields:
  - account_id
  - destination_chave
  - amount_brl
  - account_age_days
  - device_id
  - timestamp
falsepositives:
  - Clientes corporativos legítimos abrindo conta para folha de pagamento
  - Usuário transferindo saldo de outra fintech (migração intencional)
  - Recebimento legítimo de venda em marketplace
level: high
