title: Boleto Paid With Amount Divergent From Originating PIX Cobranca
id: 13361365-9716-4556-b360-0e8ec6c53638
status: experimental
description: |
  Detects boletos paid where the amount differs from the original PIX QR
  cobrança or invoice issued for the same payer/merchant relationship in
  the prior 24h. Indicates a forged "segunda via" boleto generated by
  fraudster (Reboleto) sent to victim with altered amount or beneficiary,
  while the legitimate PIX cobrança remains unpaid. Cross-channel divergence
  is a strong tell for fake billing documents.
  Link to threat pattern: customizations/threat-intel/br-fintech/patterns/BOL-001-boleto-adulterado.yaml
references:
  - https://www.jusbrasil.com.br/noticias/nova-fraude-pix-usa-qr-code-e-codigo-de-barras-de-boletos-adulterados-para-roubar-vitimas/2242368929
  - https://flypay.com.br/2024/11/20/nao-tem-cara-de-fraude-mas-e-fraude-cuidado-com-boletos-falsos/
author: Quarry - Increase Trainer Inc.
date: 2026/05/15
modified: 2026/05/15
tags:
  - attack.t1565.001
  - attack.t1657
  - vertical.fintech_br
  - quarry.pattern.BOL-001
  - quarry.severity.high
logsource:
  product: payment_processor
  category: transaction
detection:
  selection:
    event_type: 'boleto.pay'
    has_matching_open_pix_cobranca: true
    amount_delta_pct_vs_pix_cobranca: '>=5'
  filter_legit:
    boleto_source: 'official_issuer_api'
    issuer_reconciled: true
  condition: selection and not filter_legit
fields:
  - payment_id
  - payer_account_id
  - merchant_id
  - boleto_amount_brl
  - related_pix_cobranca_amount_brl
  - amount_delta_pct
  - boleto_source
falsepositives:
  - Boleto legitimamente reemitido com juros/multa após vencimento
  - Atualização monetária de boleto IPCA/IGPM dentro do mês
  - Negociação de desconto formal entre cliente e cedente
level: high
