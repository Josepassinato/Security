# Evidence Pack — LGPD Art. 48 (Lei 13.709/2018), comunicação ANPD em 48h
#
# Real, verifiable regulation. Art. 48 of LGPD (Lei Geral de Proteção
# de Dados Pessoais, 13.709/2018) obligates the controller to notify
# the data subject and ANPD of an incident "em prazo razoável" — ANPD's
# own Resolução CD/ANPD 15/2024 anchors that to 48 hours when there
# is risk or significant damage to the data subject.
#
# This pack does NOT make a notification on the operator's behalf. It
# produces the evidence packet the DPO sends to ANPD with the
# notification: timeline, scope, technical containment, mitigation
# decisions, and the trail of agent decisions that closed the
# investigation. Replaces the typical "DPO crafts a Word doc from
# Slack screenshots at 2am" workflow.
#
# Status: NOT counsel-validated. The DPO + a privacy lawyer must
# review before this packet is sent to ANPD.

schema_version: v1

meta:
  pack_id: lgpd-art-48-anpd-48h
  regulation_code: LGPD-13709-2018
  article: Art. 48
  title: Comunicação de incidente de segurança à ANPD e ao titular
  requirement: |
    O controlador deve comunicar à autoridade nacional (ANPD) e ao
    titular a ocorrência de incidente de segurança que possa
    acarretar risco ou dano relevante aos titulares (Art. 48). A
    comunicação deve descrever, no mínimo, a natureza dos dados
    pessoais afetados, os titulares envolvidos, as medidas técnicas
    e de segurança utilizadas para a proteção dos dados, os riscos
    relacionados ao incidente, os motivos da demora caso a
    comunicação não tenha sido imediata, e as medidas adotadas para
    reverter ou mitigar os efeitos do prejuízo. ANPD Resolução CD 15
    fixa o prazo em até 48h.

reporting_period: point_in_time
output_format: ANPD_incident_48h

evidence_queries:

  - type: investigations
    label: Investigação raiz do incidente
    params:
      severity_in: [high, critical]

  - type: detections_fired
    label: Detecções acionadas no curso do incidente
    params:
      min_severity: high

  - type: ledger_export
    label: Trilha forense — decisões durante a contenção
    params:
      schema_version: v1
      # PII redaction is enabled here because the export goes to ANPD
      # as part of the official notification; the agency is entitled
      # to see categories of data affected, NOT raw PII.
      include_redacted_pii: true

  - type: config_state
    label: Estado dos controles técnicos na hora do incidente
    params:
      keys:
        - incident_response.plan_version
        - data_residency.region
        - encryption.transit
        - encryption.at_rest
        - access_logging.enabled

  - type: controls_mapping
    label: Cross-walk com frameworks de privacidade
    params:
      frameworks:
        - ISO-27001
        - NIST-CSF

narrative_template: |
  Em conformidade com o Art. 48 da Lei 13.709/2018 e a Resolução
  CD/ANPD 15, comunicamos à Autoridade Nacional de Proteção de Dados
  o incidente registrado durante o período coberto.

  Foram acionadas {{ detections_fired.total }} detecções de
  severidade alta ou crítica. A investigação raiz consta com
  {{ investigations | length }} caso(s) aberto(s); todos foram
  contidos seguindo o plano vigente
  ({{ config_state.incident_response.plan_version }}).

  Os dados pessoais armazenados pelo controlador permaneceram
  cifrados em trânsito ({{ config_state.encryption.transit }}) e
  em repouso ({{ config_state.encryption.at_rest }}). O log de
  acesso ({{ config_state.access_logging.enabled }}) registra cada
  consulta a registros de titulares; a exportação da trilha
  forense, com PII redacionada, acompanha esta comunicação.

  Medidas adotadas para reverter os efeitos do incidente, prazos
  e responsáveis estão detalhados na trilha forense exportada
  abaixo.

cross_references:
  - LGPD Art. 46 — Medidas técnicas e administrativas
  - LGPD Art. 50 — Boas práticas e governança
  - ISO 27001 A.5.24 — Information security incident management
  - ISO 27001 A.5.34 — Privacy and protection of PII
  - NIST CSF RS.CO-2 — Reporting consistent with established criteria
