# Evidence Pack — Resolução BCB 85/2021, Art. 6º
#
# This file is the *content* layer of the Bacen Evidence Pack Engine.
# The framework that consumes it lives at services/api/app/evidence_pack/.
#
# IMPORTANT: this pack references real, verifiable regulation
# (Resolução BCB 85/2021, available at bcb.gov.br). The article
# paraphrase below is plain-language; the auditable obligation is the
# article text itself, which the compiler links to in the rendered PDF.
#
# This pack has NOT been counsel-validated. It is a working draft of
# the DSL format. Before it goes to a real fiscalização, the DPO and a
# Bacen-specialist lawyer must review and sign off — see
# .planning/private/CARD-016 §7 (Risco jurídico) for the process.

schema_version: v1

meta:
  pack_id: bcb-85-2021-art-6
  regulation_code: BCB-85-2021
  article: Art. 6º
  title: Política de segurança cibernética — plano de ação e resposta a incidentes
  requirement: |
    A política de segurança cibernética deve incluir um plano de ação e
    de resposta a incidentes, com os procedimentos a serem seguidos
    durante e após a ocorrência de incidentes relevantes; o pessoal
    envolvido deve ter conhecimento desses procedimentos. A entidade
    deve evidenciar, para fins de fiscalização, que o plano existe,
    está atualizado e que os procedimentos são efetivamente seguidos.

reporting_period: 90d
output_format: BCB_RFI_v1

evidence_queries:

  - type: config_state
    label: Plano de resposta a incidentes vigente
    params:
      keys:
        - incident_response.plan_version
        - incident_response.last_review_date
        - incident_response.approved_by

  - type: config_state
    label: Governança e responsabilidades (Art. 7º)
    params:
      keys:
        # Art. 7º Res. BCB 85/2021 — diretor responsável designado
        # pela conformidade com a política de segurança cibernética.
        # Fiscalização verifica esse mapeamento explicitamente.
        - compliance.designated_director_name
        - compliance.designated_director_cpf
        - compliance.designated_director_role
        - compliance.board_approval_date
        - compliance.board_approval_minutes_ref

  - type: config_state
    label: Treinamento e execução do plano
    params:
      keys:
        # Fiscalização Bacen verifica "o plano existe" + "o plano é
        # executado" — não basta documentar, precisa demonstrar prática.
        - incident_response.training_completion_rate
        - incident_response.last_training_date
        - incident_response.last_tabletop_exercise_date
        - incident_response.last_tabletop_exercise_outcome
        - incident_response.policy_revision_history_ref

  - type: detections_fired
    label: Detecções relevantes acionadas no período
    params:
      min_severity: medium

  - type: investigations
    label: Investigações abertas e fechadas no período
    params:
      severity_in: [medium, high, critical]

  - type: ledger_export
    label: Trilha de auditoria — decisões dos agentes
    params:
      schema_version: v1
      include_redacted_pii: false

  - type: controls_mapping
    label: Cross-walk com frameworks de certificação
    params:
      frameworks:
        - ISO-27001
        - NIST-CSF

narrative_template: |
  Este pacote de evidências demonstra, perante fiscalização Bacen, a
  aderência aos Arts. 6º e 7º da Resolução BCB 85/2021 no que toca à
  manutenção, governança e operacionalização do plano de resposta
  a incidentes cibernéticos.

  Governança (Art. 7º) — Diretor responsável designado:
    Nome: {{ config_state["compliance.designated_director_name"] }}
    CPF:  {{ config_state["compliance.designated_director_cpf"] }}
    Cargo: {{ config_state["compliance.designated_director_role"] }}
    Aprovação do colegiado: {{ config_state["compliance.board_approval_date"] }}
    Referência da ata: {{ config_state["compliance.board_approval_minutes_ref"] }}

  Política vigente (Art. 6º):
    Versão: {{ config_state.incident_response.plan_version }}
    Última revisão: {{ config_state.incident_response.last_review_date }}
    Aprovado por: {{ config_state.incident_response.approved_by }}
    Histórico de revisões: {{ config_state["incident_response.policy_revision_history_ref"] }}

  Execução do plano (demonstração de aderência prática):
    Cobertura de treinamento: {{ config_state.incident_response.training_completion_rate }}
    Último treinamento: {{ config_state["incident_response.last_training_date"] }}
    Último teste de mesa (tabletop): {{ config_state["incident_response.last_tabletop_exercise_date"] }}
    Resultado do tabletop: {{ config_state["incident_response.last_tabletop_exercise_outcome"] }}

  No período coberto, {{ ledger_export.entries_count }} entradas no
  ledger forense documentam decisões agentes, e
  {{ detections_fired.total }} detecções de severidade média ou
  superior foram acionadas. Todas as investigações abertas estão
  refletidas no Investigation Ledger com cadeia probatória citável.

cross_references:
  - Res. BCB 85/2021 Art. 7º — Diretor responsável designado
  - ISO 27001 A.5.24 — Information security incident management planning
  - ISO 27001 A.5.26 — Response to information security incidents
  - NIST CSF RS.RP-1 — Response plan is executed during or after an incident
  - NIST CSF RS.CO-1 — Personnel know their roles
  - NIST CSF PR.AT-1 — Awareness training
