# Evidence Pack — LGPD Art. 48 (Lei 13.709/2018) c/c Res. CD/ANPD 15/2024
#
# Real, verifiable regulation. Art. 48 of LGPD (Lei Geral de Proteção
# de Dados Pessoais, 13.709/2018) obligates the controller to notify
# the data subject and ANPD of an incident "em prazo razoável" — ANPD's
# own Resolução CD/ANPD 15/2024 anchors that to **3 (três) dias úteis**
# from the date the controller becomes aware of the incident (the
# previous draft text floated "48h"; the final published Resolução
# settled on the longer business-day window).
#
# This pack does NOT make a notification on the operator's behalf. It
# produces the evidence packet the DPO sends to ANPD with the
# notification: timeline, scope, technical containment, mitigation
# decisions, affected-subject estimate, data categories (including
# sensitive), risk analysis, and the trail of agent decisions that
# closed the investigation. Replaces the typical "DPO crafts a Word
# doc from Slack screenshots at 2am" workflow.
#
# Status: counsel-validated (Parecer Jurídico Nº 012/2026, Dr. Ricardo
# Mendes, OAB pendente). DPO + privacy lawyer must still review each
# notification before sending to ANPD.

schema_version: v1

meta:
  pack_id: lgpd-art-48-anpd-res-15-2024
  regulation_code: LGPD-13709-2018
  article: Art. 48 c/c Res. CD/ANPD 15/2024
  title: Comunicação de incidente de segurança à ANPD e ao titular
  requirement: |
    O controlador deve comunicar à autoridade nacional (ANPD) e ao
    titular a ocorrência de incidente de segurança que possa
    acarretar risco ou dano relevante aos titulares (Art. 48 LGPD).
    A Resolução CD/ANPD nº 15/2024 fixa o prazo em até 3 (três)
    dias úteis contados da data em que o controlador tomou
    conhecimento do incidente, e exige, no mínimo (Art. 4º):
      II — número estimado de titulares afetados;
      III — categorias de dados pessoais afetados, com destaque
            para dados sensíveis;
      IV  — descrição dos riscos potenciais aos titulares;
      V   — medidas técnicas e administrativas adotadas para
            contenção e mitigação;
      VI  — nome, CPF/CNPJ, e-mail e telefone do Encarregado (DPO).

reporting_period: point_in_time
output_format: ANPD_incident_res_15_2024

evidence_queries:

  - type: investigations
    label: Investigação raiz do incidente
    params:
      severity_in: [high, critical]

  - type: detections_fired
    label: Detecções acionadas no curso do incidente
    params:
      min_severity: high

  - type: ledger_export
    label: Trilha forense — decisões durante a contenção
    params:
      schema_version: v1
      # PII redaction is enabled here because the export goes to ANPD
      # as part of the official notification; the agency is entitled
      # to see categories of data affected, NOT raw PII.
      include_redacted_pii: true

  - type: config_state
    label: Estado dos controles técnicos no momento do incidente
    params:
      keys:
        # Plan + posture
        - incident_response.plan_version
        - data_residency.region
        - encryption.transit
        - encryption.at_rest
        - access_logging.enabled
        # Res. ANPD 15/2024 Art. 4º required fields (II, III, IV, V, VI):
        - incident.affected_subjects_estimate          # II — nº estimado de titulares
        - incident.data_categories                     # III — categorias de dados
        - incident.sensitive_data_categories           # III — destaque para sensíveis
        - incident.risk_assessment                     # IV — riscos potenciais aos titulares
        - incident.containment_measures                # V — contenção (técnicas)
        - incident.mitigation_measures                 # V — mitigação (administrativas)
        - dpo.full_name                                # VI — DPO
        - dpo.cpf_or_cnpj
        - dpo.email
        - dpo.phone

  - type: controls_mapping
    label: Cross-walk com frameworks de privacidade
    params:
      frameworks:
        - ISO-27001
        - NIST-CSF

narrative_template: |
  Em conformidade com o Art. 48 da Lei 13.709/2018 e a Resolução
  CD/ANPD nº 15/2024, comunicamos à Autoridade Nacional de Proteção
  de Dados o incidente registrado durante o período coberto. A
  presente comunicação observa o prazo de até 3 (três) dias úteis
  contados da data do conhecimento do incidente.

  Foram acionadas {{ detections_fired.total }} detecções de
  severidade alta ou crítica. A investigação raiz consta com
  {{ investigations | length }} caso(s) aberto(s); todos foram
  contidos seguindo o plano vigente
  ({{ config_state.incident_response.plan_version }}).

  Número estimado de titulares afetados:
  {{ config_state["incident.affected_subjects_estimate"] }}.
  Categorias de dados pessoais afetados:
  {{ config_state["incident.data_categories"] }}.
  Categorias sensíveis envolvidas (Art. 5º, II, LGPD):
  {{ config_state["incident.sensitive_data_categories"] }}.

  Riscos potenciais aos titulares:
  {{ config_state["incident.risk_assessment"] }}.

  Medidas técnicas adotadas para contenção:
  {{ config_state["incident.containment_measures"] }}.
  Medidas administrativas para mitigação:
  {{ config_state["incident.mitigation_measures"] }}.

  Os dados pessoais armazenados pelo controlador permaneceram
  cifrados em trânsito ({{ config_state.encryption.transit }}) e
  em repouso ({{ config_state.encryption.at_rest }}). O log de
  acesso ({{ config_state.access_logging.enabled }}) registra cada
  consulta a registros de titulares.

  Encarregado pelo Tratamento (DPO):
    Nome:     {{ config_state["dpo.full_name"] }}
    CPF/CNPJ: {{ config_state["dpo.cpf_or_cnpj"] }}
    E-mail:   {{ config_state["dpo.email"] }}
    Telefone: {{ config_state["dpo.phone"] }}

cross_references:
  - LGPD Art. 46 — Medidas técnicas e administrativas
  - LGPD Art. 50 — Boas práticas e governança
  - Res. CD/ANPD 15/2024 Art. 4º — Requisitos da notificação
  - ISO 27001 A.5.24 — Information security incident management
  - ISO 27001 A.5.34 — Privacy and protection of PII
  - NIST CSF RS.CO-2 — Reporting consistent with established criteria
