# Evidence Pack — Comunicado Bacen 44.323/2024, incidente cibernético em 24h
#
# Real, verifiable Bacen communication (44.323/2024) published in
# 2024 anchoring the 24-hour cyber-incident notification obligation
# that Res. BCB 85/2021 establishes at a high level (Art. 6, V). The
# Comunicado pinned the timing and standardised the form fields the
# regulated entity must populate when notifying.
#
# This pack produces the evidence dossier the security operations
# team submits with the 24h notification: timeline of detection,
# containment status at submission time, technical scope (assets,
# data classes), and the agent-decision trail.
#
# Status: NOT counsel-validated. The CISO/DPO + a Bacen-specialist
# lawyer must review before submission to BCB.

schema_version: v1

meta:
  pack_id: bcb-comunicado-44323-2024-24h
  regulation_code: BCB-COMUNICADO-44323-2024
  article: Comunicado
  title: Notificação de incidente cibernético em 24 horas
  requirement: |
    Comunicado 44.323/2024 do Banco Central fixa as diretrizes para
    notificação de incidente cibernético em até 24 horas após a
    detecção. A entidade regulada deve informar: natureza e
    classificação do incidente, ativos afetados, escopo dos dados
    e sistemas envolvidos, medidas de contenção em curso, status
    do plano de continuidade, e a estimativa de impacto. A
    notificação é cumulativa à comunicação à ANPD (LGPD Art. 48)
    quando há dado pessoal envolvido.

reporting_period: point_in_time
output_format: BCB_24h_incident

evidence_queries:

  - type: detections_fired
    label: Detecções que originaram o incidente
    params:
      min_severity: high

  - type: investigations
    label: Investigações abertas no incidente
    params:
      severity_in: [high, critical]

  - type: ledger_export
    label: Trilha forense — primeiras 24 horas
    params:
      schema_version: v1
      # PII redacted by default: the 24h notification reports
      # *categories* of data affected, not raw records.
      include_redacted_pii: true

  - type: config_state
    label: Postura de segurança no momento da detecção
    params:
      keys:
        - incident_response.plan_version
        - incident_response.last_review_date
        - business_continuity.plan_version
        - access_control.mfa_enforced
        - network.egress_filtering_enabled
        - backup.last_successful_at

  - type: config_state
    label: Impacto operacional e continuidade (Comunicado 44.323/2024)
    params:
      keys:
        # Bacen analisa continuidade operacional + criticidade sistêmica
        # + resposta executiva. Estes campos são o que o supervisor
        # examina primeiro na notificação 24h.
        - incident.operational_impact_description
        - incident.critical_services_affected      # lista: PIX, TED, internet banking, mobile, etc
        - incident.contingency_status              # ativado / parcial / não acionado
        - incident.estimated_recovery_time         # RTO restante
        - incident.estimated_data_loss             # RPO efetivo se aplicável

  - type: config_state
    label: Impacto em rails de pagamento e Open Finance
    params:
      keys:
        # Bacen tem visão sistêmica de PIX e Open Finance — qualquer
        # incidente que toque esses rails é avaliado com peso adicional.
        - pix.affected               # boolean: incidente impactou PIX
        - pix.degradation_window     # janela de degradação, se houve
        - pix.transactions_blocked   # número de transações afetadas
        - open_finance.affected      # boolean: impactou Open Finance
        - open_finance.tpp_consents_affected  # nº de consentimentos
        - open_finance.fapi_endpoints_down    # endpoints fora do ar

  - type: config_state
    label: Timeline objetiva do incidente
    params:
      keys:
        - incident.first_detected_at        # T0 — detecção
        - incident.first_responder_engaged_at  # T1 — equipe acionada
        - incident.containment_started_at   # T2 — contenção iniciada
        - incident.containment_completed_at # T3 — contenção concluída
        - incident.eradication_completed_at # T4 — erradicação
        - incident.public_communication_at  # T5 — comunicação externa
        - incident.full_recovery_at         # T6 — restauração total

  - type: config_state
    label: Terceiros e cadeia de fornecimento envolvidos
    params:
      keys:
        # Origem do incidente em terceiro (vendor, parceiro, prestador
        # de TI) muda o tratamento regulatório — Bacen precisa saber.
        - incident.third_party_involved       # boolean
        - incident.third_party_name           # vendor / parceiro
        - incident.third_party_contract_ref   # referência contratual
        - incident.third_party_notified_at    # quando o terceiro foi avisado
        - incident.third_party_response       # resposta recebida

  - type: sigma_rules_active
    label: Regras de detecção em produção (subset relevante)
    params:
      rule_ids:
        - PIX-mule-burst
        - ATO-otp-relay
        - boleto-phishing-email
        - openfinance-tpp-throttle

  - type: controls_mapping
    label: Cross-walk com Res. BCB 85 e LGPD
    params:
      frameworks:
        - ISO-27001
        - NIST-CSF

narrative_template: |
  Em conformidade com o Comunicado Bacen 44.323/2024 e o Art. 6º,
  V da Res. BCB 85/2021, comunicamos ao Banco Central a ocorrência
  do incidente cibernético detectado no período coberto.

  IMPACTO OPERACIONAL
    Descrição: {{ config_state["incident.operational_impact_description"] }}
    Serviços críticos afetados: {{ config_state["incident.critical_services_affected"] }}
    Status de contingência: {{ config_state["incident.contingency_status"] }}
    Tempo estimado de recuperação: {{ config_state["incident.estimated_recovery_time"] }}
    Perda de dados estimada (RPO): {{ config_state["incident.estimated_data_loss"] }}

  IMPACTO EM RAILS DE PAGAMENTO
    PIX afetado: {{ config_state["pix.affected"] }}
      Janela de degradação: {{ config_state["pix.degradation_window"] }}
      Transações bloqueadas: {{ config_state["pix.transactions_blocked"] }}
    Open Finance afetado: {{ config_state["open_finance.affected"] }}
      Consentimentos TPP afetados: {{ config_state["open_finance.tpp_consents_affected"] }}
      Endpoints FAPI fora do ar: {{ config_state["open_finance.fapi_endpoints_down"] }}

  TIMELINE OBJETIVA
    T0 detecção:           {{ config_state["incident.first_detected_at"] }}
    T1 equipe acionada:    {{ config_state["incident.first_responder_engaged_at"] }}
    T2 contenção iniciada: {{ config_state["incident.containment_started_at"] }}
    T3 contenção concluída:{{ config_state["incident.containment_completed_at"] }}
    T4 erradicação:        {{ config_state["incident.eradication_completed_at"] }}
    T5 comunicação pública:{{ config_state["incident.public_communication_at"] }}
    T6 restauração total:  {{ config_state["incident.full_recovery_at"] }}

  TERCEIROS / CADEIA DE FORNECIMENTO
    Envolvimento de terceiro: {{ config_state["incident.third_party_involved"] }}
    Nome: {{ config_state["incident.third_party_name"] }}
    Referência contratual: {{ config_state["incident.third_party_contract_ref"] }}
    Notificação ao terceiro: {{ config_state["incident.third_party_notified_at"] }}
    Resposta recebida: {{ config_state["incident.third_party_response"] }}

  POSTURA DE SEGURANÇA NO MOMENTO DA DETECÇÃO
    MFA aplicado: {{ config_state.access_control.mfa_enforced }}
    Filtragem de egress: {{ config_state.network.egress_filtering_enabled }}
    Último backup íntegro: {{ config_state.backup.last_successful_at }}
    Plano de continuidade: {{ config_state.business_continuity.plan_version }}

  DETECÇÕES E INVESTIGAÇÕES
  Foram acionadas {{ detections_fired.total }} detecções de
  severidade alta ou crítica nas primeiras 24 horas. A
  investigação envolve {{ investigations | length }} caso(s)
  ativo(s); todos foram tratados sob o plano de resposta vigente
  ({{ config_state.incident_response.plan_version }}, revisado em
  {{ config_state.incident_response.last_review_date }}).

  A trilha forense detalhada, com PII pseudonimizada (HMAC-SHA256 +
  salt por tenant — Res. CD/ANPD 15/2024) e cadeia probatória
  citável (Merkle + TSA ICP-Brasil + e-CNPJ A3), acompanha esta
  notificação.

cross_references:
  - Res. BCB 85/2021 Art. 6 V — comunicação de incidente
  - Res. CMN 4.893/2021 — Política de Segurança Cibernética
  - LGPD Art. 48 — notificação ANPD (quando há dado pessoal)
  - ISO 27001 A.5.25 — Assessment of information security events
  - ISO 27001 A.5.27 — Learning from information security incidents
  - NIST CSF RS.AN-1 — Notifications from detection systems
