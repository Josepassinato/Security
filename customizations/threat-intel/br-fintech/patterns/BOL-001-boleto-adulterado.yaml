id: BOL-001
name: Boleto Adulterado (Bolware / Reboleto)
category: boleto_fraud
severity: high
description: |
  Categoria histórica BR. Existem duas variantes principais:

  1) Malware "Bolware" (família clássica) — vírus no PC/smartphone que
     intercepta o ato de copiar/colar de código de barras ou linha digitável
     de boleto e troca o destinatário para conta do golpista antes do
     pagamento. A vítima vê o valor correto mas paga em conta errada.

  2) Ferramenta "Reboleto" / boletos forjados sem malware — emissores
     fraudulentos geram boletos com cara de empresa legítima (concessionárias,
     prefeituras, escolas), enviam por e-mail/WhatsApp com pretexto plausível,
     e a vítima paga sem desconfiar.

  Em 2024, boletos falsos e PIX juntos representaram 32,8% dos golpes
  financeiros segundo FEBRABAN. Permanece relevante mesmo com o crescimento
  do PIX.

  BR-específico: boleto é instrumento de pagamento brasileiro (CIP/Sicoob),
  com formato e fluxo únicos. Variante de TTPs internacionais de invoice
  fraud, mas com técnica e ecossistema próprios.

mitre_techniques:
  - id: T1565.002
    name: "Data Manipulation: Transmitted Data Manipulation"
  - id: T1056.001
    name: "Input Capture: Keylogging"
  - id: T1657
    name: "Financial Theft"

data_sources_required:
  - boleto_payment_events
  - device_telemetry
  - clipboard_monitoring_events
  - merchant_account_provenance

indicators:
  - name: boleto_recipient_mismatch_with_qr_or_barcode
    threshold: "linha digitável aponta para banco/agência diferente do informado no PDF"
  - name: high_volume_boletos_to_new_payee_account
    threshold: ">10 boletos pagos para conta com <30d em <7d"
  - name: clipboard_anomaly_app
    threshold: "presença de app com permissão de acessibilidade não-padrão durante pagamento"
  - name: known_malware_signature
    threshold: "device tem hash/signature de família Bolware/Brookial em telemetria"

