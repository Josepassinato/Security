notes: |
  Detecção forte vem do lado emissor (a fintech que aceita o pagamento):
  marcar contas-destino novas que recebem alta concentração de boletos
  como suspeitas e monitorar reclamações. Lado pagador: alertar quando o
  cedente do boleto não bate com o vendedor esperado.
