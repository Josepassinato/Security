quarry_status: documented

related_patterns:
  - SEN-001
  - VSH-001

notes: |
  Mitigações sugeridas: substituir SMS-OTP por TOTP/push autenticador,
  bind de device com attestation (Play Integrity/DeviceCheck), exigir
  re-KYC quando device muda + reset de senha. Operadoras já são obrigadas
  a bloquear portabilidade quando cliente solicita, mas a opção ainda é
  pouco usada.
