notes: |
  Mitigação UX: bancos podem destacar o NOME E TIPO (PF vs PJ) do
  destinatário ANTES da confirmação, com aviso quando QR estático leva
  a PF. Comerciantes podem migrar para QR dinâmico (gera novo QR por
  compra), eliminando o ataque, mas o custo de UX para pequenos é alto.
