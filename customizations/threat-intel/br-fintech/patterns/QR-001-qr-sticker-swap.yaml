id: QR-001
name: QR Code Sticker Swap (PIX Estático em Estabelecimento)
category: qr_code_fraud
severity: medium
description: |
  Em estabelecimentos físicos (padarias, estacionamentos, food trucks,
  feiras, restaurantes) que expõem QR Code estático para pagamento via PIX,
  criminosos colam um adesivo com QR Code próprio sobre o legítimo. Cliente
  escaneia, paga ao golpista, e o estabelecimento só descobre a fraude
  depois — quando o cliente já saiu e o lojista nota que o valor não caiu.

  Variante adicional: quishing — QR malicioso em PDFs/imagens de cobrança
  falsas enviadas por e-mail/WhatsApp, redirecionando para destinatário
  errado.

  BR-específico: explora a ubiquidade do PIX QR estático em pequenos
  comércios e a falta de UX de validação de destinatário (muitos
  consumidores confirmam sem ler o nome no app).

mitre_techniques:
  - id: T1656
    name: "Impersonation"
  - id: T1657
    name: "Financial Theft"

data_sources_required:
  - pix_transactions
  - merchant_geolocation_data
  - dispute_logs

indicators:
  - name: qr_pix_payment_to_pf_at_pj_merchant_location
    threshold: "PIX para pessoa física quando geofence indica estabelecimento PJ"
  - name: cluster_of_disputes_same_location_short_window
    threshold: ">=3 disputas geradas por leituras de QR no mesmo merchant em 7d"
  - name: payee_unrelated_to_merchant_name
    threshold: "nome do recebedor não tem similaridade textual com merchant registrado"

