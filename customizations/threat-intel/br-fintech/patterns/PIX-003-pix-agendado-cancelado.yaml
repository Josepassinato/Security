id: PIX-003
name: PIX Agendado com Cancelamento Pré-Liquidação
category: social_engineering
severity: medium
description: |
  Em marketplaces (OLX, Facebook Marketplace, grupos de WhatsApp), o
  criminoso se apresenta como comprador, agenda um PIX para o vendedor
  (PIX agendamento, recurso oficial do BACEN), envia o comprovante de
  agendamento — visualmente parecido com um PIX imediato — e pede entrega
  imediata do produto. Antes da liquidação (no dia/horário agendado), o
  golpista CANCELA o agendamento dentro do prazo permitido. A vítima
  entrega o produto e descobre depois que o dinheiro nunca caiu.

  BR-específico: explora a funcionalidade nativa do PIX Agendado (parte
  do regulamento BACEN do PIX) e a UX inconsistente de alguns comprovantes
  de agendamento vs. comprovantes de liquidação.

mitre_techniques:
  - id: T1656
    name: "Impersonation"
  - id: T1657
    name: "Financial Theft"

data_sources_required:
  - pix_scheduled_transactions
  - pix_scheduled_cancellations

indicators:
  - name: scheduled_pix_cancellation_rate_by_account
    threshold: ">30% de PIX agendados emitidos são cancelados antes da liquidação"
  - name: cancellation_within_hours_of_schedule
    threshold: "cancelamento <2h antes da data prevista (típico após receber produto)"
  - name: counterpart_in_marketplace_complaint_list
    threshold: "destinatário aparece em lista de reclamações externas (Reclame Aqui, etc.)"

sources:
