    publisher: Fagundes Advocacia
    date: "2024-09-26"
    title: "Golpe do PIX agendado: como identificar fraudes e proteger suas transações"
  - url: https://blog.nubank.com.br/golpe-do-pix-agendado-entenda/
    publisher: Nubank (blog oficial)
    date: "2024"
    title: "Golpe do Pix Agendado: entenda o alerta que está circulando pelas redes"
  - url: https://www.letsmoney.com.br/noticias/golpe-pix-agendado-ia-comprovante-falso
    publisher: Let's Money
    date: "2024"
    title: "Golpe do Pix agendado usa IA para enganar vítimas"

br_specific: true
quarry_status: documented

related_patterns:
  - PIX-001

notes: |
  Mitigação UX clara: comprovantes de PIX agendado devem ter banner visual
  distinto (cor/label) vs. PIX liquidado. Algumas fintechs (Nubank, Mercado
  Pago) já adotaram. Fintechs podem ainda alertar comerciantes na confirmação
  de recebimento.
