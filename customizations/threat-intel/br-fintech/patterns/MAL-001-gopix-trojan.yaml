  - BOL-001
  - PIX-001

notes: |
  Detecção endpoint-side: monitorar certificate store, PAC config,
  presença de servidor HTTP local em port estranho. Server-side
  (fintech): comparar chave PIX inicial digitada (se capturada via
  app oficial) com chave efetivamente enviada — discrepância é flag forte.
