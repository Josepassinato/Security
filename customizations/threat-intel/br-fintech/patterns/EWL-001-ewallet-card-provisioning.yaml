id: EWL-001
name: Cartão Provisionado Fraudulentamente em E-Wallet (Apple Pay / Google Wallet)
category: ewallet_fraud
severity: high
description: |
  Após obter dados de cartão (PAN + CVV + validade) via phishing ou
  vazamento, o atacante inicia a provisão do cartão em uma carteira
  digital (Apple Pay, Google Wallet, Samsung Pay) num device do criminoso.
  A etapa crítica é a verificação "yellow path" do EMV (OTP/ligação ao
  emissor), em que atacantes usam engenharia social (vishing) para obter
  o OTP da vítima, ou exploram emissores com verificação fraca.

  Uma vez provisionado, o cartão tokenizado vira pagamentos contactless
  em qualquer lugar do mundo, sem precisar do cartão físico. Técnicas
  avançadas: "Ghost Tap" — retransmissão NFC entre celular do criminoso
  no Brasil e mula com terminal em outro país.

  BR-específico parcial: o TTP é global, mas o Brasil aparece em casos
  com Itaú, Bradesco e outros emissores. Reclamações públicas no
  Reclame Aqui e fóruns apontam para verificação fraca de provisionamento.

mitre_techniques:
  - id: T1111
    name: "Multi-Factor Authentication Interception"
  - id: T1556
    name: "Modify Authentication Process"
  - id: T1657
    name: "Financial Theft"

data_sources_required:
  - card_tokenization_events
  - contactless_transaction_logs
  - issuer_otp_logs
  - device_fingerprint_logs

indicators:
  - name: card_provisioning_followed_by_high_geo_velocity
    threshold: "provisão em wallet + uso contactless em país diferente <24h"
  - name: provisioning_attempt_after_failed_login
    threshold: ">=3 falhas de login no app emissor seguidas de provisão em wallet"
  - name: contactless_to_high_risk_mcc
    threshold: "primeira transação contactless em MCC de alto risco (jogo, cripto, transferência)"
  - name: rapid_burst_low_amount
    threshold: ">=5 transações <R$200 em <1h (teste de cartão tokenizado)"

