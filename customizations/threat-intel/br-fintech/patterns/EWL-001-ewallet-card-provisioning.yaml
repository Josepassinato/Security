br_specific: false
quarry_status: documented

related_patterns:
  - VSH-001
  - ATO-001

notes: |
  Mitigações principais ficam no emissor: fortalecer o "yellow path"
  (chamar o cliente em vez de SMS-OTP; confirmação no app oficial; cooldown
  para uso contactless em país novo após provisão). Detecção comportamental
  do cartão tokenizado é essencial — token reusa "BIN", então abordagens
  baseadas em PAN não pegam.
