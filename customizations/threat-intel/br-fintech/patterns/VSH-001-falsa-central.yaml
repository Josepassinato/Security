id: VSH-001
name: Falsa Central de Atendimento (Vishing com Spoofing)
category: vishing
severity: critical
description: |
  Criminosos ligam para a vítima usando spoofing de Bina/Caller ID exibindo
  o número OFICIAL do banco (ex.: 0800 729 0001 do Bradesco). Se apresentam
  como segurança/antifraude, criam urgência ("movimentação suspeita
  detectada", "tentativa de invasão"), e induzem a vítima a: (a) transferir
  saldo para "conta segura"; (b) revelar senhas/tokens; (c) instalar app de
  acesso remoto (AnyDesk, TeamViewer) para "verificação".

  Em 2024 foi um dos 3 golpes mais reportados à FEBRABAN (105 milhões de
  registros, 3º lugar). Em 2025, o golpe dobrou no 1º semestre. Cerca de
  metade dos R$ 3 bi em fraudes digitais de 2024 esteve ligada a vishing.

  BR-específico: facilitado pela disponibilidade de bases vazadas (CPF,
  dados bancários, nome da agência) que dão verossimilhança ao golpe, e
  pela alta confiança cultural no 0800 do banco.

mitre_techniques:
  - id: T1566.004
    name: "Phishing: Spearphishing Voice"
  - id: T1656
    name: "Impersonation"
  - id: T1219
    name: "Remote Access Software"
  - id: T1657
    name: "Financial Theft"

data_sources_required:
  - customer_session_logs
  - pix_transactions
  - device_attestation_logs
  - remote_access_app_install_telemetry
  - call_center_inbound_logs

indicators:
  - name: remote_access_app_active_during_pix
    threshold: "presença de AnyDesk/TeamViewer/RustDesk em foreground durante PIX"
  - name: pix_to_new_payee_high_value
    threshold: ">R$2000 para chave nunca usada, em <30min após primeiro contato externo"
  - name: customer_reports_post_event
    threshold: "ticket no SAC <24h mencionando 'central', 'segurança', 'falso atendente'"
  - name: session_anomaly_geo_velocity
    threshold: "login + transferência de IPs geograficamente distintos em <1h"

