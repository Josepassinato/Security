br_specific: true
quarry_status: documented

related_patterns:
  - PIX-001
  - MAL-002
  - SEN-001

notes: |
  Mitigação técnica forte: detectar presença de app de acesso remoto em
  foreground durante operações financeiras (a maioria dos apps bancários
  já bloqueia). Mitigação UX: nunca pedir senha/token em ligação; fintech
  pode adicionar "cooldown" obrigatório para PIX a novo beneficiário acima
  de um valor (BACEN já permite limites de R$ 200/transação noturno).
