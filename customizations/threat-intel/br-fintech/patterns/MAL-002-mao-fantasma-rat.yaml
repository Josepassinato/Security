br_specific: true
quarry_status: documented

related_patterns:
  - VSH-001
  - MAL-001

notes: |
  Detecção forte está no client (app bancário): SafetyNet/Play Integrity,
  detecção de accessibility services maliciosos, detecção de overlay,
  bloqueio de operações sensíveis quando app de acesso remoto está
  rodando. Server-side: comportamento "robótico" de toques + horários
  atípicos (madrugada, padrão do criminoso).
