id: PIX-002
name: Golpe do PIX Errado (Falso Estorno)
category: social_engineering
severity: high
description: |
  O criminoso transfere via PIX um valor REAL para a conta da vítima e em
  seguida contata via WhatsApp/SMS alegando "PIX enviado por engano",
  pedindo o estorno. O detalhe-chave é que ele pede o estorno para uma
  conta de terceiro (conta B), diferente da que originou o PIX (conta A).
  A vítima, agindo de boa fé, transfere seus próprios recursos para o
  golpista. Em paralelo, o criminoso aciona o banco de origem reportando
  fraude e tenta acionar o MED para recuperar o PIX original — tendo
  potencialmente lucro duplo (valor de A volta + valor enviado a B).

  BR-específico: depende do PIX (transferência instantânea reversível via
  MED) e da cultura PIX-WhatsApp brasileira. A correção segura é usar a
  função "devolver" no extrato do próprio app, garantindo retorno à conta
  de origem.

mitre_techniques:
  - id: T1656
    name: "Impersonation"
  - id: T1657
    name: "Financial Theft"
  - id: T1566
    name: "Phishing"

data_sources_required:
  - pix_transactions
  - customer_support_tickets
  - med_requests_log

indicators:
  - name: pix_received_then_outbound_different_account
    threshold: "saída em <2h para conta DIFERENTE da que originou entrada"
  - name: pix_inbound_amount_match
    threshold: "valor de saída == valor de entrada (+/- 1%)"
  - name: med_request_after_outbound
    threshold: "MED aberto pelo originador em <6h após PIX original"
  - name: customer_contact_via_external_channel
    threshold: "ticket SAC mencionando 'pix por engano' ou 'devolução'"

sources:
