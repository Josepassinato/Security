    access_note: public

br_specific: true
quarry_status: documented

related_patterns:
  - PIX-001
  - SEN-001

notes: |
  Esta detecção é DELICADA: muitos PIX errados são genuínos. Sinal mais forte
  é a combinação (saída para conta diferente) + (abertura de MED pelo
  originador). Fintechs devem oferecer botão "devolver para a origem" no
  extrato e bloquear UX que sugira outras formas de devolução.
