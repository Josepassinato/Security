  - ATO-001
  - VSH-001

notes: |
  Fintechs podem reduzir prejuízo com:
  - Confirmação extra (foto, biometria) em PIX para chave nova com nome
    similar ao do titular (heurística "mesmo sobrenome = possível golpe
    familiar").
  - Banner explícito "verifique por chamada de voz" quando o destinatário
    tem o sobrenome do remetente.
  - Mensagens preventivas no in-app inbox alertando sobre o padrão.
