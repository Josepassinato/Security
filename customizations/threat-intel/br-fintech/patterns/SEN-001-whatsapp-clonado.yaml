id: SEN-001
name: WhatsApp Clonado / Sequestrado para Golpe Familiar PIX
category: social_engineering
severity: critical
description: |
  Criminosos sequestram a conta WhatsApp da vítima (via SIM swap, phishing
  do código SMS de 6 dígitos da verificação em duas etapas, ou compra de
  acesso em mercados clandestinos). Com acesso ao histórico e contatos,
  enviam mensagens a familiares/amigos pedindo PIX urgente ("troquei de
  número, manda no novo Pix da minha conta", "preciso pagar conta agora").

  Em 2024 foi o golpe MAIS reportado à FEBRABAN (153 milhões de casos,
  29% do total). Combina SIM swap, vazamentos de dados (foto de perfil
  pública + número exposto via leak), engenharia social e PIX.

  BR-específico: WhatsApp é praticamente infraestrutura social no Brasil
  (>90% de penetração). A combinação WhatsApp + PIX é fator brasileiro
  único.

mitre_techniques:
  - id: T1656
    name: "Impersonation"
  - id: T1586
    name: "Compromise Accounts"
  - id: T1657
    name: "Financial Theft"
  - id: T1111
    name: "Multi-Factor Authentication Interception"

data_sources_required:
  - pix_transactions
  - contact_book_changes
  - device_fingerprint_logs
  - kyc_verification_logs

indicators:
  - name: first_pix_to_new_payee_named_familiar
    threshold: "PIX para chave nunca usada cujo titular tem sobrenome igual ao da vítima"
  - name: rapid_consecutive_pix_to_distinct_payees
    threshold: ">=3 PIX para destinatários diferentes em <30min"
  - name: amount_clustering
    threshold: "valores típicos R$500-R$3000 (faixa 'pedido familiar')"
  - name: outbound_to_account_flagged_in_DICT
    threshold: "chave destino com marcação de fraude no DICT"

