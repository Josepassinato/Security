# JSON Schema (em YAML) que valida cada pattern .yaml em patterns/
# Versão: 1.0.0
# Última atualização: 2026-05-15
#
# Cada arquivo em patterns/ DEVE seguir este schema.
# Para validar, use qualquer ferramenta JSON Schema (ajv, python-jsonschema, etc.).
# Convertendo este YAML para JSON e rodando contra o pattern.yaml.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/quarry/customizations/threat-intel/br-fintech/schema.yaml"
title: "Brazilian Fintech Threat Pattern"
description: "Schema para padrões de ameaças contra fintechs brasileiras. Todos os patterns precisam de pelo menos uma fonte pública verificável."
type: object
required:
  - id
  - name
  - category
  - severity
  - description
  - sources
  - br_specific
  - quarry_status
additionalProperties: false

properties:
  id:
    type: string
    pattern: "^[A-Z]{2,4}-[0-9]{3}$"
    description: "ID único no formato CATEGORIA-NNN. Ex.: PIX-001, ATO-001, MAL-001."

  name:
    type: string
    minLength: 6
    maxLength: 120
    description: "Nome curto e descritivo do padrão de ataque."

  category:
    type: string
    enum:
      - pix_fraud
      - account_takeover
      - boleto_fraud
      - qr_code_fraud
      - vishing
      - malware_banking
      - social_engineering
      - ewallet_fraud
      - open_finance_abuse
      - mule_network
    description: "Categoria principal do ataque."

  severity:
    type: string
    enum: [low, medium, high, critical]
    description: "Severidade estimada (impacto x prevalência no Brasil)."

  description:
    type: string
    minLength: 60
    description: "Descrição em português do padrão. Inclua o porquê de ser BR-específico, se aplicável."

  mitre_techniques:
    type: array
    description: "Técnicas MITRE ATT&CK mapeadas. Opcional, mas recomendado."
    items:
      type: object
      required: [id, name]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^T[0-9]{4}(\\.[0-9]{3})?$"
        name:
          type: string

  data_sources_required:
    type: array
    description: "Fontes de dados necessárias para detectar o padrão via Quarry."
    items:
      type: string

  indicators:
    type: array
    description: "Indicadores/limiares heurísticos que sugerem o padrão."
    items:
      type: object
      required: [name, threshold]
      additionalProperties: false
      properties:
        name:
          type: string
        threshold:
          type: string
          description: "Threshold em formato livre (ex.: '<7d', '>R$10000', '>80%')."
        description:
          type: string

  sources:
    type: array
    minItems: 1
    description: "Fontes públicas verificáveis. PELO MENOS uma URL real é obrigatória."
    items:
      type: object
      required: [url, publisher, date, title]
      additionalProperties: false
      properties:
        url:
          type: string
          format: uri
        publisher:
          type: string
          description: "Nome do veículo/organização (ex.: BACEN, FEBRABAN, Kaspersky, CNN Brasil)."
        date:
          type: string
          description: "Data da publicação no formato YYYY-MM-DD ou YYYY-MM ou YYYY se incerta."
        title:
          type: string
        access_note:
          type: string
          description: "Opcional: 'paywall', 'login required', 'public', 'arquivo'."

  br_specific:
    type: boolean
    description: "True se for variante distinta de TTP internacional (justifique em description)."

  quarry_status:
    type: string
    enum: [documented, rule_drafted, rule_active, deprecated]
    description: "documented = catalogado; rule_drafted = regra Sigma/SQL rascunhada; rule_active = regra ativa em produção; deprecated = não mais relevante."

  related_patterns:
    type: array
    description: "IDs de outros patterns relacionados (combos comuns)."
    items:
      type: string
      pattern: "^[A-Z]{2,4}-[0-9]{3}$"

  notes:
    type: string
    description: "Notas livres do autor para revisores futuros."
