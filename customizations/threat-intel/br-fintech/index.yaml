# Índice de Threat Patterns — Fintechs Brasileiras
# Última atualização: 2026-05-15
# Versão do catálogo: 0.1.0 (seed inicial)
# Total: 11 patterns documentados
#
# Convenção de IDs:
#   PIX-NNN — Fraudes específicas de PIX (instantâneo)
#   ATO-NNN — Account Takeover
#   BOL-NNN — Fraudes de Boleto
#   QR-NNN  — Fraudes de QR Code
#   VSH-NNN — Vishing / Voice phishing
#   SEN-NNN — Engenharia Social
#   EWL-NNN — E-Wallet (Apple Pay, Google Wallet)
#   MAL-NNN — Malware bancário
#   OFI-NNN — Open Finance abuse (reservado, sem patterns ainda)

patterns:
