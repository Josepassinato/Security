<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Quarry — Autonomous Threat Hunting for the Post-Mythos Era</title>
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="55%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="ogGlow" cx="220" cy="160" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(139,0,0,0.32)"/>
      <stop offset="100%" stop-color="rgba(139,0,0,0)"/>
    </radialGradient>
    <pattern id="ogGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogGrid)"/>
  <rect width="1200" height="630" fill="url(#ogGlow)"/>

  <!-- Mark -->
  <g transform="translate(110,170)" stroke="#8B0000" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M120 0 L240 65 L240 215 L120 290 L0 215 L0 65 Z"/>
    <path d="M120 0 L120 290" opacity="0.5"/>
    <path d="M0 65 L240 215" opacity="0.5"/>
    <path d="M240 65 L0 215" opacity="0.5"/>
  </g>
  <circle cx="230" cy="315" r="18" fill="#8B0000"/>

  <!-- Wordmark + tagline -->
  <g fill="#f7f4ef">
    <text x="430" y="258" font-family="'Fraunces', 'Times New Roman', serif" font-size="124" font-weight="600" letter-spacing="-3">Quarry</text>
    <text x="432" y="318" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#9a9a9a" letter-spacing="3.4">POST-MYTHOS · MIT-FORK · PRIVATE</text>
    <text x="432" y="392" font-family="'Fraunces', serif" font-size="36" font-style="italic" font-weight="400" fill="#cbd5d8">Autonomous threat hunting,</text>
    <text x="432" y="438" font-family="'Fraunces', serif" font-size="36" font-style="italic" font-weight="400" fill="#cbd5d8">audited end-to-end.</text>
  </g>

