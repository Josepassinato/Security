<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Quarry">
  <title>Quarry mark</title>
  <rect width="64" height="64" rx="12" fill="#1a1a1a"/>
  <g stroke="#8B0000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Hexagonal pit (quarry) -->
    <path d="M32 10 L52 22 L52 42 L32 54 L12 42 L12 22 Z"/>
    <!-- Depth lines suggesting a quarry pit -->
    <path d="M32 10 L32 54" opacity="0.6"/>
    <path d="M12 22 L52 42" opacity="0.6"/>
    <path d="M52 22 L12 42" opacity="0.6"/>
  </g>
  <!-- Center mark — the find -->
  <circle cx="32" cy="32" r="3.6" fill="#8B0000"/>
</svg>
