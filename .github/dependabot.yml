version: 2

# Quarry policy: dependabot is SECURITY-ALERTS-ONLY until the rebrand card lands.
#
# Version-bump PRs against the inherited AiSOC tree create noise without value
# while we haven't yet committed any Quarry-specific code into the inherited
# services/. We re-enable wide version updates only after rebrand + the first
# Quarry-owned production deploy.
#
# `open-pull-requests-limit: 0` is the documented way to disable version-bump
# PRs while keeping security-vulnerability alerts active.
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#open-pull-requests-limit
#
# See ADR-002 for rationale.

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0

  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: monthly
    open-pull-requests-limit: 0

  - package-ecosystem: pip
    directory: /services/agents
    schedule:
      interval: monthly
    open-pull-requests-limit: 0

  - package-ecosystem: pip
    directory: /services/actions
    schedule:
      interval: monthly
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /services/ingest
    schedule:
      interval: monthly
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /services/enrichment
    schedule:
      interval: monthly
    open-pull-requests-limit: 0

  - package-ecosystem: gomod
    directory: /services/demo-producer
    schedule:
      interval: monthly
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
